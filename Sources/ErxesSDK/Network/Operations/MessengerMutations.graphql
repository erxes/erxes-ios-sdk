# ── Fragments ────────────────────────────────────────────────────────────────

fragment UserDetailFields on UserDetails {
    avatar
    fullName
}

fragment MessageFields on ConversationMessage {
    _id
    conversationId
    customerId
    user {
        _id
        details {
            ...UserDetailFields
        }
    }
    content
    createdAt
    internal
    fromBot
    contentType
    engageData {
        content
        kind
        sentAs
        fromUser {
            _id
            details {
                ...UserDetailFields
            }
        }
    }
    botData
    messengerAppData
    attachments {
        url
        name
        size
        type
    }
}

# ── Mutations ─────────────────────────────────────────────────────────────────

# Step 1 – called on every SDK launch to get/create the customer session.
# integrationId comes from your erxes dashboard (replaces old brandCode flow).
mutation connect(
    $integrationId: String!
    $visitorId: String
    $cachedCustomerId: String
    $email: String
    $isUser: Boolean
    $phone: String
    $code: String
    $data: JSON
    $companyData: JSON
) {
    widgetsMessengerConnect(
        integrationId: $integrationId
        visitorId: $visitorId
        cachedCustomerId: $cachedCustomerId
        email: $email
        isUser: $isUser
        phone: $phone
        code: $code
        data: $data
        companyData: $companyData
    ) {
        integrationId
        languageCode
        uiOptions {
            color
            wallpaper
            logo
        }
        messengerData {
            supporterIds
            notifyCustomer
            availabilityMethod
            isOnline
            onlineHours {
                day
                from
                to
            }
            timezone
            messages {
                greet
                away
                thank
                welcome
            }
            requireAuth
            showChat
            showLauncher
            forceLogoutWhenResolve
            showVideoCallRequest
        }
        ticketConfig {
            _id
            name
        }
        customerId
        visitorId
        customer {
            _id
            firstName
            lastName
            phones
            emails
            primaryEmail
            primaryPhone
        }
    }
}

# Step 2 – register page visit; may trigger automated welcome messages.
mutation widgetsSaveBrowserInfo(
    $customerId: String
    $visitorId: String
    $browserInfo: JSON!
) {
    widgetsSaveBrowserInfo(
        customerId: $customerId
        visitorId: $visitorId
        browserInfo: $browserInfo
    ) {
        ...MessageFields
    }
}

# Send a chat message.
mutation widgetsInsertMessage(
    $integrationId: String!
    $customerId: String
    $visitorId: String
    $conversationId: String
    $message: String
    $contentType: String
    $attachments: [AttachmentInput]
) {
    widgetsInsertMessage(
        integrationId: $integrationId
        customerId: $customerId
        visitorId: $visitorId
        conversationId: $conversationId
        message: $message
        contentType: $contentType
        attachments: $attachments
    ) {
        ...MessageFields
    }
}

# Mark all messages in a conversation as read.
mutation widgetsReadConversationMessages($conversationId: String!) {
    widgetsReadConversationMessages(conversationId: $conversationId)
}

# Update customer profile (name, email, phone).
mutation editCustomer(
    $customerId: String!
    $firstName: String
    $lastName: String
    $emails: [String]
    $phones: [String]
) {
    editCustomer(
        _id: $customerId
        firstName: $firstName
        lastName: $lastName
        emails: $emails
        phones: $phones
    ) {
        _id
        firstName
        lastName
        primaryEmail
        primaryPhone
        emails
        phones
    }
}

# ── Lead / Form widget ────────────────────────────────────────────────────────

mutation widgetsLeadConnect(
    $channelId: String!
    $formCode: String!
    $cachedCustomerId: String
) {
    WidgetsLeadConnect(
        channelId: $channelId
        formCode: $formCode
        cachedCustomerId: $cachedCustomerId
    ) {
        integrationId
        formId
        form {
            _id
            title
            description
        }
    }
}

mutation widgetsSaveLead(
    $formId: String!
    $submissions: [FieldValueInput]
    $browserInfo: JSON
    $cachedCustomerId: String
) {
    widgetsSaveLead(
        formId: $formId
        submissions: $submissions
        browserInfo: $browserInfo
        cachedCustomerId: $cachedCustomerId
    ) {
        status
        conversationId
        customerId
        errors {
            fieldId
            code
            text
        }
    }
}
