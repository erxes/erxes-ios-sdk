# ── Fragments ────────────────────────────────────────────────────────────────

fragment UserDetailFields on UserDetails {
    avatar
    fullName
}

fragment UserFields on User {
    _id
    details {
        ...UserDetailFields
    }
}

# ── Queries ───────────────────────────────────────────────────────────────────

# List all conversations for this customer/visitor.
query widgetsConversations(
    $integrationId: String!
    $customerId: String
    $visitorId: String
) {
    widgetsConversations(
        integrationId: $integrationId
        customerId: $customerId
        visitorId: $visitorId
    ) {
        _id
        content
        createdAt
        unreadCount
        messages {
            _id
            content
            createdAt
            attachments {
                url
                name
                type
            }
            user {
                ...UserFields
            }
        }
        participatedUsers {
            ...UserFields
        }
    }
}

# Full detail of one conversation including all messages.
query widgetsConversationDetail($_id: String!, $integrationId: String) {
    widgetsConversationDetail(_id: $_id, integrationId: $integrationId) {
        _id
        status
        operatorStatus
        readUserIds
        messages {
            _id
            conversationId
            customerId
            content
            createdAt
            internal
            fromBot
            contentType
            botData
            messengerAppData
            attachments {
                url
                name
                size
                type
            }
            user {
                ...UserFields
            }
            engageData {
                content
                kind
                sentAs
                fromUser {
                    ...UserFields
                }
            }
        }
        isOnline
        supporters {
            ...UserFields
            isOnline
        }
    }
}

# Fetch online supporters for the launcher widget.
query widgetsMessengerSupporters($integrationId: String!) {
    widgetsMessengerSupporters(integrationId: $integrationId) {
        supporters {
            ...UserFields
            isOnline
        }
        isOnline
        availabilityMethod
    }
}

# Total unread badge count.
query widgetsTotalUnreadCount(
    $integrationId: String!
    $customerId: String
    $visitorId: String
) {
    widgetsTotalUnreadCount(
        integrationId: $integrationId
        customerId: $customerId
        visitorId: $visitorId
    )
}
