# Real-time new message in a conversation.
subscription conversationMessageInserted($_id: String!) {
    conversationMessageInserted(_id: $_id) {
        _id
        conversationId
        customerId
        content
        createdAt
        internal
        fromBot
        contentType
        botData
        messengerAppData
        attachments {
            url
            name
            size
            type
        }
        user {
            _id
            details {
                avatar
                fullName
            }
        }
    }
}

# Bot is currently typing indicator.
subscription conversationBotTypingStatus($_id: String!) {
    conversationBotTypingStatus(_id: $_id) {
        _id
        typing
    }
}

# Customer's own message echoed back (deduplication).
subscription conversationClientMessageInserted($userId: String!) {
    conversationClientMessageInserted(userId: $userId) {
        _id
        conversationId
        content
        createdAt
        contentType
    }
}

# Admin/operator sends a direct message to a visitor.
subscription adminMessageInserted($customerId: String!) {
    conversationAdminMessageInserted(customerId: $customerId) {
        customerId
        unreadCount
    }
}

# Conversation status changes (e.g. resolved → open).
subscription conversationChanged($conversationId: String!) {
    conversationChanged(conversationId: $conversationId) {
        conversationId
        type
    }
}
