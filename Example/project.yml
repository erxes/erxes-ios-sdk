name: MessengerExample
options:
  bundleIdPrefix: com.messenger
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MessengerExample:
    type: application
    platform: iOS
    sources:
      - MessengerExample
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.messenger.example
        INFOPLIST_FILE: MessengerExample/Info.plist
    dependencies:
      - package: MessengerSDK
        product: MessengerSDK

packages:
  MessengerSDK:
    path: ..
